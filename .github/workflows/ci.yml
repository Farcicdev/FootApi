name: CI - Foot API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Chekout do codigo
        uses: actions/checkout@v4

      - name: Configurar java 17
        uses: actions/chekout@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: maven

      - name: permissao Maven wrapper
        run: chmod +x mvnw

      - name: Build + Test
        run: ./mvnw clean verify

      - name: gerar artifact do Jar
        if: succes()
        uses: actions/upload-artifact@v4
        with:
          name: foot-api-jar
          path: target/*.jar