spring:
  application:
    name: footApi

  datasource:
    url: jdbc:postgresql://localhost:5431/db_foot
    username: postgres
    password: postgre

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080